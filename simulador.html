<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.png" type="image/png">
    <title>Importify Simulador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="style.css"></script>

    <style>
      body {
        background: radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 24%),
          radial-gradient(circle at bottom right, rgba(16,185,129,0.12), transparent 18%),
          linear-gradient(180deg, #0b1221 0%, #111827 100%);
      }
      .glass {
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(24px);
      }
    </style>
  </head>
  <body class="min-h-screen font-sans text-slate-100">
    <div class="mx-auto flex min-h-screen max-w-[1600px] flex-col px-4 py-6 sm:px-6 lg:px-8">
      <header class="relative">
        <nav class="glass sticky top-0 z-50 mb-8 flex flex-col gap-4 rounded-3xl border border-white/10 bg-slate-900/70 px-6 py-4 shadow-xl shadow-slate-950/40 backdrop-blur-xl md:flex-row md:items-center md:justify-between">
          <a href="./index.html" class="flex items-center gap-3">
            <img src="./logo.jpg" alt="Importify logo" class="h-12 w-12 rounded-full object-cover shadow-lg" />
            <div>
              <p class="text-sm uppercase tracking-[0.35em] text-slate-300">Importify</p>
              <p class="text-xs text-slate-400">Logística y comercio</p>
            </div>
          </a>
          <div class="flex flex-wrap items-center gap-4 text-sm text-slate-200">
            <a href="./index.html" class="pb-1 border-b-2 border-transparent transition hover:border-teal-300">Inicio</a>
            <a href="./simulador.html" class="pb-1 border-b-2 border-transparent transition hover:border-teal-300">Simulador</a>
            <a href="./historial.html" class="pb-1 border-b-2 border-transparent transition hover:border-teal-300">Historial</a>
            <a href="./datosimulacion.html" class="pb-1 border-b-2 border-transparent transition hover:border-teal-300">Datos</a>
          </div>
        </nav>
      </header>

      <main class="mx-auto w-full max-w-2xl rounded-[32px] border border-white/10 p-8 shadow-[0_50px_120px_rgba(15,23,42,0.7)] glass sm:p-10">
        <div class="text-center">
          <p class="text-sm font-semibold uppercase tracking-[0.35em] text-slate-400">Inicia tu simulación de importación</p>
          <h1 class="mt-4 text-3xl font-semibold text-white sm:text-4xl">Paso 1 de 2: Configuración básica</h1>
        </div>

        <form class="mt-10 space-y-6">
          <div>
            <label for="country" class="text-sm font-medium text-slate-300">País de origen</label>
            <select id="country" name="country" class="mt-3 w-full rounded-3xl border border-white/10 bg-slate-900/80 px-4 py-4 text-slate-100 shadow-inner shadow-slate-950/30 focus:border-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-500/20">
              <option value="usa" class="flex items-center gap-2">🇺🇸 Estados Unidos</option>
              <option value="china" class="flex items-center gap-2">🇨🇳 China</option>
              <option value="taiwan" class="flex items-center gap-2">🇹🇼 Taiwán</option>
              <option value="germany" class="flex items-center gap-2">🇩🇪 Alemania</option>
            </select>
          </div>

          <div>
            <label for="category" class="text-sm font-medium text-slate-300">Categoría del producto</label>
            <select id="category" name="category" class="mt-3 w-full rounded-3xl border border-white/10 bg-slate-900/80 px-4 py-4 text-slate-100 shadow-inner shadow-slate-950/30 focus:border-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-500/20">
              <option value="technology">Tecnología</option>
              <option value="fashion">Moda</option>
              <option value="food">Alimentos y bebidas</option>
              <option value="industrial">Industrial</option>
            </select>
          </div>

          <div>
            <label for="product" class="text-sm font-medium text-slate-300">Producto específico</label>
            <select id="product" name="product" class="mt-3 w-full rounded-3xl border border-white/10 bg-slate-900/80 px-4 py-4 text-slate-100 shadow-inner shadow-slate-950/30 focus:border-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-500/20">
              <option value="laptops">Portátiles</option>
              <option value="smartphones">Teléfonos inteligentes</option>
              <option value="accessories">Accesorios</option>
              <option value="wearables">Dispositivos portátiles</option>
            </select>
          </div>

          <div>
            <label class="text-sm font-medium text-slate-300">Método de importación <span class="text-slate-500">(Tus 3 opciones)</span></label>
            <div class="mt-3 grid gap-4 sm:grid-cols-3">
              <label class="flex cursor-pointer flex-col rounded-[26px] border border-white/10 bg-slate-900/80 px-4 py-5 text-slate-100 transition hover:border-sky-400/50 hover:bg-slate-900/95">
                <input type="radio" name="method" value="expert" class="mb-3 h-5 w-5 accent-sky-400" checked />
                <span class="text-base font-semibold">El experto</span>
                <span class="mt-2 text-sm text-slate-400">Precisión manual</span>
              </label>
              <label class="flex cursor-pointer flex-col rounded-[26px] border border-white/10 bg-slate-900/80 px-4 py-5 text-slate-100 transition hover:border-sky-400/50 hover:bg-slate-900/95">
                <input type="radio" name="method" value="intermediate" class="mb-3 h-5 w-5 accent-sky-400" />
                <span class="text-base font-semibold">El intermedio</span>
                <span class="mt-2 text-sm text-slate-400">Modo equilibrado</span>
              </label>
              <label class="flex cursor-pointer flex-col rounded-[26px] border border-sky-400/40 bg-sky-500/10 px-4 py-5 text-sky-100 shadow-[0_20px_50px_rgba(56,189,248,0.12)] transition hover:border-sky-300/60 hover:bg-sky-500/15">
                <input type="radio" name="method" value="easy" class="mb-3 h-5 w-5 accent-sky-400" />
                <span class="text-base font-semibold">La forma fácil</span>
                <span class="mt-2 text-sm text-slate-200">Configuración más rápida</span>
              </label>
            </div>
          </div>

          <div>
            <label for="fob" class="text-sm font-medium text-slate-300">Precio base estimado del fabricante (FOB - opcional, para mayor precisión)</label>
            <div class="mt-3 flex items-center gap-3 rounded-3xl border border-white/10 bg-slate-900/80 px-4 py-4 shadow-inner shadow-slate-950/30">
              <span class="text-slate-400">$</span>
              <input
                id="fob"
                name="fob"
                type="number"
                step="0.01"
                min="0"
                placeholder="0.00"
                class="w-full bg-transparent text-slate-100 outline-none placeholder:text-slate-500"
              />
            </div>
          </div>

          <button type="submit" class="mt-8 w-full rounded-3xl bg-emerald-500 px-6 py-4 text-base font-semibold text-slate-950 transition hover:bg-emerald-400">
            CONTINUAR AL SIMULADOR DE COSTOS →
          </button>
        </form>
      </main>

      <footer class="mt-12 flex justify-center text-center text-xs text-slate-500">
        © 2026 Importify - Plataforma moderna de fabricantes y logística
      </footer>
    </div>
  </body>
</html>
